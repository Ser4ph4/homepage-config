##############################################################
- logo:
    icon: /icons/logo.webp
    href: https://pi.local
    target: _self
- resources:
    cputemp: true
    tempmin: 0
    tempmax: 100
- resources:
    cpu: true
    expanded: true
- resources:
    expanded: true
    memory: true
- resources:
    expanded: true
    disk:
      - /
      - /sdb2
- resources:
    expanded: true
    network: eth0
- stocks:
    type: stocks
    provider: finnhub
    color: true
    cache: 15
    watchlist:
      - BTC
      - ETH
      - NVDA
      - AAPL
      - MSFT
- openweathermap:
    timezone: America/Sao_Paulo
    units: metric
    longitude: -51.999999999999
    latitude: -23.99999999
    provider: openweathermap
    apiKey: 999999999999999
    cache: 15
    format:
      maximumFractionDigits: 1
- datetime:
    locale: br
    format:
      timeStyle: short
##############################################################
